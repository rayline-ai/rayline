name: Bug report
description: Report a reproducible Rayline bug.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Rayline version
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include commands, sanitized config, and sanitized logs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
