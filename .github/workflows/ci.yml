name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
          rustup component add rustfmt clippy

      - name: Metadata
        run: cargo metadata --locked --format-version 1 --no-deps

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --workspace --locked -- --test-threads=1

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build release binaries
        env:
          RAYLINE_VERSION: 0.2.0-ci
          RAYLINE_CHANNEL: main
        run: cargo build --release -p rayline-cli -p rayline-daemon --locked
