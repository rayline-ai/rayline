name: Rust Supply Chain Security

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "deny.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/security.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "deny.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "23 7 * * 1" # Weekly Monday at 07:23 UTC
  workflow_dispatch:

concurrency:
  group: rust-supply-chain-security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --file Cargo.lock

  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny
        run: cargo deny --locked check advisories bans licenses sources

  codeql-rust:
    name: CodeQL Rust
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: rust
          build-mode: none
          config: |
            paths:
              - crates

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
