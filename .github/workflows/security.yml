name: Rust Supply Chain Security

# These jobs are required by the main branch ruleset. Keep them unfiltered so
# docs-only and config-only PRs still publish the required check contexts.
on:
  push:
  pull_request:
  schedule:
    - cron: "23 7 * * 1" # Weekly Monday at 07:23 UTC
  workflow_dispatch:

concurrency:
  group: rust-supply-chain-security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_AUDIT_VERSION: "0.22.2"
  CARGO_DENY_VERSION: "0.19.9"
  RUST_VERSION: "1.88.0"

jobs:
  cargo-audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"

      - name: Install cargo-audit
        run: cargo install cargo-audit --version "$CARGO_AUDIT_VERSION" --locked

      - name: Run cargo audit
        # RUSTSEC-2026-0185 (quinn-proto): quinn is an optional reqwest dep that
        # is not compiled into any Rayline binary, and the fix (0.11.15) was
        # published the same day, which our 7-day supply-chain policy bars us
        # from adopting yet. Drop this ignore when bumping the lockfile. The
        # rationale is mirrored in deny.toml [advisories].
        run: cargo audit --file Cargo.lock --ignore RUSTSEC-2026-0185

  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"

      - name: Install cargo-deny
        run: cargo install cargo-deny --version "$CARGO_DENY_VERSION" --locked

      - name: Run cargo deny
        run: cargo deny --locked check advisories bans licenses sources

  codeql-rust:
    name: CodeQL Rust
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: rust
          build-mode: none
          config: |
            paths:
              - crates

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
